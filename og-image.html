<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #050508;
    font-family: 'Georgia', serif;
    position: relative;
  }

  /* Grid background */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Radial glow */
  .glow {
    position: absolute;
    top: -100px; left: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
  }
  .glow2 {
    position: absolute;
    bottom: -150px; right: -50px;
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(13,16,48,0.8) 0%, transparent 70%);
  }

  /* Top border line */
  .top-line {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent, #c9a84c, transparent);
  }

  /* Left accent bar */
  .left-bar {
    position: absolute; left: 60px; top: 80px; bottom: 80px;
    width: 2px;
    background: linear-gradient(to bottom, #c9a84c, rgba(201,168,76,0.1));
  }

  /* Main content */
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 100px;
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 0.35em;
    text-transform: uppercase; color: #c9a84c;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .eyebrow::before {
    content: '';
    display: block; width: 36px; height: 1px;
    background: #c9a84c;
  }

  .name {
    font-family: 'Georgia', serif;
    font-size: 88px; font-weight: 700;
    color: #f0eeea; line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  .name em {
    font-style: normal; color: transparent;
    -webkit-text-stroke: 2px #c9a84c;
  }

  .title {
    font-family: 'Georgia', serif;
    font-size: 26px; font-weight: 400;
    color: #a8a49c; letter-spacing: 0.02em;
    margin-bottom: 40px;
  }

  .tags {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .tag {
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: #8a6a20;
    border: 1px solid rgba(201,168,76,0.2);
    padding: 5px 12px;
    background: rgba(201,168,76,0.04);
  }

  /* Right side — URL */
  .url-block {
    position: absolute;
    bottom: 60px; right: 80px;
    text-align: right;
  }
  .url {
    font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 0.1em;
    color: rgba(201,168,76,0.5);
  }

  /* Ghost A */
  .ghost {
    position: absolute;
    right: -20px; top: -60px;
    font-family: 'Georgia', serif;
    font-size: 400px; font-weight: 700; line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1px rgba(201,168,76,0.05);
    user-select: none; pointer-events: none;
  }

  /* Corner clip marks */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 1px solid rgba(201,168,76,0.4); border-left: 1px solid rgba(201,168,76,0.4); }
  .corner.tr { top: 20px; right: 20px; border-top: 1px solid rgba(201,168,76,0.4); border-right: 1px solid rgba(201,168,76,0.4); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(201,168,76,0.4); border-left: 1px solid rgba(201,168,76,0.4); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(201,168,76,0.4); border-right: 1px solid rgba(201,168,76,0.4); }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="top-line"></div>
  <div class="left-bar"></div>
  <div class="ghost">A</div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="eyebrow">Full-Stack Developer</div>
    <div class="name">Aaryan<em>.</em></div>
    <div class="title">Building things that work, scale, and matter.</div>
    <div class="tags">
      <span class="tag">Node.js</span>
      <span class="tag">Express</span>
      <span class="tag">MongoDB</span>
      <span class="tag">React</span>
      <span class="tag">JavaScript</span>
      <span class="tag">C++</span>
    </div>
  </div>

  <div class="url-block">
    <div class="url">aaryan-aggrawa-v1.netlify.app</div>
  </div>
</body>
</html>
